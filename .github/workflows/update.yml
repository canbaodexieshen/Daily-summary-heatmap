name: Update Daily Summary Heatmap

on:
  schedule:
    # 每天早上 8:00 (北京时间 8:00 = UTC 0:00) 执行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install github-heatmap

      - name: Update heatmap
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          YEAR: ${{ github.event.inputs.year || env.YEAR }}
        run: |
          python update_daily_summary_heatmap.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add daily_summary_heatmap/main.svg
          git diff --staged --quiet || git commit -m "Update daily summary heatmap $(date +'%Y-%m-%d')"
          git push
